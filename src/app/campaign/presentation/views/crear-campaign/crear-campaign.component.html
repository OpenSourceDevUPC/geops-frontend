<div class="crear-campaign-container">
  <div class="form-header">
    <h2>Crear Nueva Campaña</h2>
    <button mat-icon-button (click)="onCancel()">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <form [formGroup]="campaignForm" (ngSubmit)="onSubmit()" class="campaign-form">
    <mat-form-field appearance="outline">
      <mat-label>Nombre de la Campaña</mat-label>
      <input matInput formControlName="name" placeholder="Ej: Promoción Verano 2025">
      <mat-error *ngIf="campaignForm.get('name')?.hasError('required')">
        El nombre es requerido
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Descripción</mat-label>
      <textarea matInput formControlName="description" rows="4" placeholder="Describe tu campaña..."></textarea>
      <mat-error *ngIf="campaignForm.get('description')?.hasError('required')">
        La descripción es requerida
      </mat-error>
    </mat-form-field>

    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>Fecha de Inicio</mat-label>
        <input matInput [matDatepicker]="startPicker" formControlName="startDate">
        <mat-datepicker-toggle matIconSuffix [for]="startPicker"></mat-datepicker-toggle>
        <mat-datepicker #startPicker></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Fecha de Fin</mat-label>
        <input matInput [matDatepicker]="endPicker" formControlName="endDate">
        <mat-datepicker-toggle matIconSuffix [for]="endPicker"></mat-datepicker-toggle>
        <mat-datepicker #endPicker></mat-datepicker>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline">
      <mat-label>Presupuesto Estimado (S/.)</mat-label>
      <input matInput type="number" formControlName="estimatedBudget" placeholder="0.00">
      <mat-icon matPrefix>attach_money</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Estado Inicial</mat-label>
      <mat-select formControlName="status">
        <mat-option value="ACTIVE">Activa</mat-option>
        <mat-option value="PAUSED">Pausada</mat-option>
      </mat-select>
    </mat-form-field>

    <div class="form-actions">
      <button mat-button type="button" (click)="onCancel()">Cancelar</button>
      <button mat-raised-button color="primary" type="submit" [disabled]="loading()">
        {{ loading() ? 'Creando...' : 'Crear Campaña' }}
      </button>
    </div>

    <div *ngIf="error()" class="error-message">
      {{ error() }}
    </div>
  </form>
</div>
