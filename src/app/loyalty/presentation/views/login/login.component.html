<div class="login-container">
  <h2 class="login-title">Inicio de sesión</h2>
  <form class="login-form" (ngSubmit)="onSubmit()" #loginForm="ngForm">
    <label class="login-label">Email:</label>
    <input class="login-input" type="email" name="email" [(ngModel)]="model.email" required />

    <label class="login-label">Contraseña:</label>
    <input class="login-input" type="password" name="password" [(ngModel)]="model.password" required />

    <button class="login-btn" type="submit" [disabled]="loading || !loginForm.form.valid">Entrar</button>
  </form>
  <p class="login-register-msg">
    ¿No tienes cuenta?
    <a class="login-register-link" [routerLink]="['/register']">Regístrate aquí</a>
  </p>
  <div *ngIf="errorMessage" class="login-error">{{errorMessage}}</div>
</div>
