<div class="register-container">
  <h2>Registro de usuario</h2>
  <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
    <label>Nombre:</label>
    <input type="text" name="name" [(ngModel)]="model.name" required />

    <label>Email:</label>
    <input type="email" name="email" [(ngModel)]="model.email" required />

    <label>Contraseña:</label>
    <input type="password" name="password" [(ngModel)]="model.password" required />

    <label>Teléfono:</label>
    <input type="text" name="phone" [(ngModel)]="model.phone" required/>

    <label>Tipo de usuario:</label>
    <select name="role" [(ngModel)]="model.role" required>
      <option value="OWNER">Comercio (Owner)</option>
      <option value="CONSUMER">Consumidor</option>
    </select>

    <label>Plan:</label>
    <select name="plan" [(ngModel)]="model.plan" required>
      <option value="BASIC">Básico</option>
      <option value="PREMIUM">Premium</option>
    </select>

    <!-- El botón solo se habilita si el form ES válido -->
    <button type="submit" [disabled]="registering || !registerForm.form.valid">Registrarse</button>
  </form>
  <p>¿Ya tienes cuenta? <a [routerLink]="['/']">Inicia sesión aquí</a></p>
  <div *ngIf="errorMessage" class="error">{{errorMessage}}</div>
</div>
