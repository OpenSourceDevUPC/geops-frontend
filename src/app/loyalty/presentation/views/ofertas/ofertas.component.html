<div class="layout">
  <h2 class="page-title">Ofertas </h2>

  <div class="content">

    <section *ngIf="!loading && active() as o" class="card">
      <div class="left">
        <h1 class="title">{{ o.title }}</h1>

        <div class="partner">{{ o.partner }}</div>

        <div class="rating">
          <span class="star" *ngFor="let s of [1,2,3,4,5]"></span>
          <span class="rate">5.0</span>
        </div>

        <div class="price">
          <span class="currency">s/</span>
          <span class="amount">{{ o.price | number:'1.2-2' }}</span>
        </div>

        <button class="buy">Comprar</button>
      </div>

      <div class="right">
        <div class="img-wrap">
          <img [src]="imgFor(o)" [alt]="o.title" />
        </div>
      </div>

      <div class="lines" *ngIf="featured.length">
      <span *ngFor="let _ of featured; let i = index"
            class="line"
            [class.active]="i === idx"
            (click)="goTo(i)"></span>
      </div>
    </section>

    <section class="filters-bar" *ngIf="!loading">
      <input class="flt" type="text" placeholder="Buscar"
             [(ngModel)]="filters.q" (ngModelChange)="applyFilters()"/>

      <select class="flt" [(ngModel)]="filters.category" (change)="applyFilters()">
        <option value="all">Todas las categorías</option>
        <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
      </select>

      <select class="flt" [(ngModel)]="filters.sort" (change)="applyFilters()">
        <option value="relevance">Relevancia</option>
        <option value="priceAsc">Menor precio</option>
        <option value="priceDesc">Mayor precio</option>
        <option value="ratingDesc">Mejor calificación</option>
      </select>

      <select class="flt" [(ngModel)]="filters.location" (change)="applyFilters()">
        <option value="all">Todas</option>
        <option *ngFor="let l of locations" [value]="l">{{ l }}</option>
      </select>

      <button class="flt clear" (click)="clearFilters()">Limpiar</button>
    </section>

    <section class="offers-grid" *ngIf="!loading">
      <article class="offer-card" *ngFor="let o of filtered">

        <div class="img-box" tabindex="0">
          <img [src]="imgFor(o)" alt="Imagen de {{ o.title }}" />
          <button class="fav" type="button"
                  [class.active]="isFav(o.id)"
                  (click)="toggleFav(o)">
            <span class="heart">{{ isFav(o.id) ? '❤️' : '💜' }}</span>
          </button>

          <span class="scrim" aria-hidden="true"></span>

          <button
            type="button"
            class="view-offer"
            aria-label="Ver oferta de {{ o.title }}"
            >
            Ver Oferta
          </button>
        </div>

        <div class="card-body">
          <h3 class="ttl">{{ o.title }}</h3>
          <div class="pname">{{ o.partner }}</div>

          <div class="stars-row">
            <span class="star" *ngFor="let s of [1,2,3,4,5]"></span>
            <span class="score">5.0</span>
          </div>

          <hr class="sep" />

          <div class="price-row">
            <div class="prc">
              <span class="curr">s/</span>
              <span class="amt">{{ o.price | number:'1.2-2' }}</span>
            </div>

            <div class="loc">
              <span class="pin" aria-hidden="true">📍</span>
              {{ o.location }}
            </div>
          </div>

          <div class="card-actions">
            <button class="buy">Comprar</button>
            <button class="add">Añadir</button>
          </div>
        </div>
      </article>
    </section>
  </div>
</div>
