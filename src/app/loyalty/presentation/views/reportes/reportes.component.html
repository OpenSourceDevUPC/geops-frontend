<div class="reportes-container">
  <!-- Header con título y botón exportar -->
  <div class="reportes-header">
    <h2>{{ title }}</h2>
    <button
      mat-raised-button
      color="primary"
      (click)="onExportCSV()"
      class="export-btn">
      Exportar CSV
    </button>
  </div>

  <!-- Contenedor de JSON -->
  <div class="json-container">
    <pre class="json-content">{{ getJsonData() }}</pre>
  </div>

  <!-- Footer -->
  <div class="reportes-footer">
    <p>© 2025 Todos los derechos reservados</p>
  </div>
</div>
