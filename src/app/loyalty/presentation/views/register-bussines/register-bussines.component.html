<div class="register-container">
  <h2>Datos adicionales del negocio</h2>
  <form (ngSubmit)="onSubmit()" #businessForm="ngForm">
    <label>Nombre del negocio:</label>
    <input type="text" name="businessName" [(ngModel)]="business.businessName" required />
    <label>Tipo de negocio:</label>
    <input type="text" name="businessType" [(ngModel)]="business.businessType" required />
    <label>Tax ID:</label>
    <input type="text" name="taxId" [(ngModel)]="business.taxId" required />
    <button type="submit" [disabled]="submitting || !businessForm.form.valid">Guardar</button>
  </form>
  <div *ngIf="errorMessage" class="error">{{errorMessage}}</div>
</div>
