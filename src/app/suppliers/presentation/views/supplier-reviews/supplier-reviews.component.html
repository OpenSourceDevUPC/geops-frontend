<div class="reviews-wrapper">
  <!-- Header Principal -->
  <header class="main-header">
    <div class="logo">GeoPs</div>
    <div class="header-actions">
      <button class="btn-ayuda" routerLink="/suppliers/help">Ayuda</button>
      <button class="btn-notification" routerLink="/suppliers/notifications">
        <span class="notification-icon">🔔</span>
      </button>
      <div class="user-profile" routerLink="/suppliers/profile">
        <span class="user-avatar">A</span>
        <span class="user-name">{{ businessName }}</span>
      </div>
    </div>
  </header>

  <!-- Navegación -->
  <nav class="main-nav">
    <a routerLink="/suppliers/dashboard" routerLinkActive="active" class="nav-item">Resumen</a>
    <a routerLink="/suppliers/campaigns" routerLinkActive="active" class="nav-item">Campañas</a>
    <a routerLink="/suppliers/create" routerLinkActive="active" class="nav-item">Crear</a>
    <a routerLink="/suppliers/reports" routerLinkActive="active" class="nav-item">Reportes</a>
    <a routerLink="/suppliers/reviews" routerLinkActive="active" class="nav-item">Comentarios</a>
  </nav>

  <!-- Contenido Principal -->
  <main class="reviews-container">
    <!-- Lista de Comentarios -->
    <div class="reviews-list">
      @for (review of reviews; track review.id) {
        <div class="review-card" [class.highlighted]="review.id === 1">
          <!-- Header del Comentario -->
          <div class="review-header">
            <div class="review-user">
              <strong>{{ review.userName }}</strong>
              <span class="review-date">· {{ review.date }}</span>
            </div>
          </div>

          <!-- Contenido del Comentario -->
          <div class="review-content">
            <p class="review-comment">{{ review.comment }}</p>
          </div>

          <!-- Campo de Respuesta -->
          <div class="review-response">
            <input
              type="text"
              class="response-input"
              placeholder=""
              [(ngModel)]="review.response"
            />
            <button class="btn-respond" (click)="onRespond(review)">
              Responder
            </button>
          </div>
        </div>
      }
    </div>
  </main>

  <!-- Footer -->
  <footer class="main-footer">
    <p>© 2025 Todos los derechos reservados</p>
  </footer>
</div>
