<div class="create-wrapper">
  <!-- Header Principal -->
  <header class="main-header">
    <div class="logo">GeoPs</div>
    <div class="header-actions">
      <button class="btn-ayuda" routerLink="/suppliers/help">Ayuda</button>
      <button class="btn-notification" routerLink="/suppliers/notifications">
        <span class="notification-icon">🔔</span>
      </button>
      <div class="user-profile" routerLink="/suppliers/profile">
        <span class="user-avatar">A</span>
        <span class="user-name">{{ businessName }}</span>
      </div>
    </div>
  </header>

  <!-- Navegación -->
  <nav class="main-nav">
    <a routerLink="/suppliers/dashboard" routerLinkActive="active" class="nav-item">Resumen</a>
    <a routerLink="/suppliers/campaigns" routerLinkActive="active" class="nav-item">Campañas</a>
    <a routerLink="/suppliers/create" routerLinkActive="active" class="nav-item">Crear</a>
    <a routerLink="/suppliers/reports" routerLinkActive="active" class="nav-item">Reportes</a>
    <a routerLink="/suppliers/reviews" routerLinkActive="active" class="nav-item">Comentarios</a>
  </nav>

  <!-- Contenido Principal -->
  <main class="create-container">
    <!-- Panel de Crear Campaña -->
    <section class="create-panel">
      <div class="create-content">
        <h1 class="create-title">Crear una nueva campaña</h1>
        <p class="create-description">
          Haz clic en <strong>Crear</strong> para abrir el editor.
        </p>
        <button class="btn-create" (click)="onCreateCampaign()">
          Crear
        </button>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="main-footer">
    <p>© 2025 Todos los derechos reservados</p>
  </footer>

  <!-- Modal Nueva Campaña -->
  @if (showNewCampaignModal) {
    <app-new-campaign-modal
      (closeModal)="closeNewCampaignModal()"
      (saveCampaign)="onSaveCampaign($event)"
    ></app-new-campaign-modal>
  }
</div>
