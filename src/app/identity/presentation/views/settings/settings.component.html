<!--
  SettingsComponent Template
  All labels and buttons use the translate pipe for internationalization.
  Keys must match those in es.json.
-->

<div class="settings-wrapper" *ngIf="user">
  <div class="settings-card">
    <!-- Profile header: avatar, name, plan, actions -->
    <div class="settings-profile">
      <div class="settings-avatar">{{ avatar }}</div>
      <div>
        <div class="settings-name">{{ user.name }}</div>
        <div class="settings-plan">
          {{ 'settings.plan.' + user.plan | translate }}
        </div>
      </div>
      <div class="settings-profile-actions">
        <button class="settings-btn secondary" [disabled]="cargando" (click)="guardar()">
          {{ 'settings.save' | translate }}
        </button>
        <button class="settings-btn" [disabled]="cargando" type="button" (click)="cancelar()">
          {{ 'settings.cancel' | translate }}
        </button>
      </div>
    </div>

    <!-- User Settings Form -->
    <form class="settings-form">
      <div class="settings-row">
        <label>{{ 'settings.name' | translate }}</label>
        <div class="input-edit-group">
          <input class="settings-input" type="text" [(ngModel)]="user.name" name="name" [disabled]="!editState['name']"/>
          <button type="button" class="edit-icon-btn" (click)="toggleEdit('name')">
            <mat-icon>edit</mat-icon>
          </button>
        </div>
      </div>
      <div class="settings-row">
        <label>{{ 'settings.plan.label' | translate }}</label>
        <select class="settings-input" [(ngModel)]="user.plan" name="plan">
          <option value="PREMIUM">{{ 'settings.plan.PREMIUM' | translate }}</option>
          <option value="BASIC">{{ 'settings.plan.BASIC' | translate }}</option>
        </select>
      </div>
      <div class="settings-row">
        <label>{{ 'settings.email' | translate }}</label>
        <div class="input-edit-group">
          <input class="settings-input" type="email" [(ngModel)]="user.email" name="email" [disabled]="!editState['email']"/>
          <button type="button" class="edit-icon-btn" (click)="toggleEdit('email')">
            <mat-icon>edit</mat-icon>
          </button>
        </div>
      </div>
      <div class="settings-row">
        <label>{{ 'settings.phone' | translate }}</label>
        <div class="input-edit-group">
          <input class="settings-input" type="text" [(ngModel)]="user.phone" name="phone" [disabled]="!editState['phone']"/>
          <button type="button" class="edit-icon-btn" (click)="toggleEdit('phone')">
            <mat-icon>edit</mat-icon>
          </button>
        </div>
      </div>
      <div class="settings-row">
        <label>{{ 'settings.locationPermission.label' | translate }}</label>
        <select class="settings-input" [(ngModel)]="user.locationPermission" name="locationPermission">
          <option value="ASK">{{ 'settings.locationPermission.ASK' | translate }}</option>
          <option value="ALWAYS">{{ 'settings.locationPermission.ALWAYS' | translate }}</option>
        </select>
      </div>
      <div class="settings-row">
        <label>{{ 'settings.home' | translate }}</label>
        <div class="input-edit-group">
          <input class="settings-input" type="text"
                 [(ngModel)]="user.home" name="home"
                 [disabled]="!editState['home']"/>
          <button type="button" class="edit-icon-btn" (click)="toggleEdit('home')">
            <mat-icon>edit</mat-icon>
          </button>
        </div>
      </div>
      <div class="settings-row">
        <label>{{ 'settings.work' | translate }}</label>
        <div class="input-edit-group">
          <input class="settings-input" type="text"
                 [(ngModel)]="user.work" name="work"
                 [disabled]="!editState['work']"/>
          <button type="button" class="edit-icon-btn" (click)="toggleEdit('work')">
            <mat-icon>edit</mat-icon>
          </button>
        </div>
      </div>
      <div class="settings-row">
        <label>{{ 'settings.favorites' | translate }}</label>
        <div class="settings-checkbox-group">
          <label *ngFor="let cat of ALL_CATEGORIES" class="category-checkbox">
            <input type="checkbox"
                   [value]="cat"
                   [checked]="user?.favorites?.includes(cat)"
                   (change)="onCategoryChange($event, cat)">
            {{ cat }}
          </label>
        </div>
      </div>
      <label>{{ 'settings.security' | translate }}</label>
      <div class="settings-row">
        <label>{{ 'settings.passwordCurrent' | translate }}</label>
        <div class="input-edit-group">
          <input class="settings-input" type="password"
                 [(ngModel)]="passwordActual"
                 placeholder="{{ 'settings.passwordCurrent' | translate }}"
                 name="passwordActual"
                 [disabled]="!editState['passwordActual']"/>
          <button type="button" class="edit-icon-btn" (click)="toggleEdit('passwordActual')">
            <mat-icon>edit</mat-icon>
          </button>
        </div>
      </div>
      <div class="settings-row">
        <label>{{ 'settings.passwordNew' | translate }}</label>
        <div class="input-edit-group">
          <input class="settings-input" type="password"
                 [(ngModel)]="newPassword"
                 placeholder="{{ 'settings.passwordNew' | translate }}"
                 name="newPassword"
                 [disabled]="!editState['newPassword']"/>
          <button type="button" class="edit-icon-btn" (click)="toggleEdit('newPassword')">
            <mat-icon>edit</mat-icon>
          </button>
        </div>
      </div>
      <div class="settings-row">
        <label>{{ 'settings.passwordConfirm' | translate }}</label>
        <div class="input-edit-group">
          <input class="settings-input" type="password"
                 [(ngModel)]="confirmPassword"
                 placeholder="{{ 'settings.passwordConfirm' | translate }}"
                 name="confirmPassword"
                 [disabled]="!editState['confirmPassword']"/>
          <button type="button" class="edit-icon-btn" (click)="toggleEdit('confirmPassword')">
            <mat-icon>edit</mat-icon>
          </button>
        </div>
      </div>
      <div class="settings-actions">
        <button class="settings-btn secondary" type="reset">
          {{ 'settings.clear' | translate }}
        </button>
        <button class="settings-btn primary" type="button" (click)="actualizarPassword()">
          {{ 'settings.changePassword' | translate }}
        </button>
      </div>
    </form>

    <div *ngIf="cargando" class="settings-loading">{{ 'settings.updating' | translate }}</div>
    <div *ngIf="mensaje" class="settings-msg">{{ mensaje }}</div>
  </div>
</div>
